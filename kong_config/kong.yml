_format_version: "3.0"

services:
  # 1. Order Service
  - name: order-service
    url: http://order-api:5000
    connect_timeout: 60000
    read_timeout: 60000
    write_timeout: 60000
    retries: 3

    routes:
      - name: order-route
        paths:
          - /api/orders
        strip_path: false

    plugins:
      - name: key-auth

      - name: rate-limiting
        config:
          minute: 10
          policy: local

      - name: cors
        config:
          origins:
            - "*"
          headers:
            - Content-Type
            - Authorization
            - apikey
          methods:
            - GET
            - POST
            - OPTIONS

  # 2. Report Service
  - name: report-service
    url: http://report-api:5001
    connect_timeout: 60000
    read_timeout: 60000
    write_timeout: 60000
    retries: 3

    routes:
      - name: report-route
        paths:
          - /api/report
        strip_path: false

    plugins:
      - name: key-auth

      - name: rate-limiting
        config:
          minute: 10
          policy: local

      - name: cors
        config:
          origins:
            - "*"
          headers:
            - Content-Type
            - Authorization
            - apikey
          methods:
            - GET
            - POST
            - OPTIONS

# 3. Consumer (Client)
consumers:
  - username: frontend-dashboard
    keyauth_credentials:
      - key: noah-secret-key
