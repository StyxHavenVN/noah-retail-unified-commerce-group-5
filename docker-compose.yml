  # 7. Streamlit Dashboard
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: noah_dashboard
    depends_on:
      - kong-gateway
    environment:
      REPORT_API_URL: http://kong-gateway:8000
    ports:
      - "8501:8501"
    networks:
      - noah_network

  # 8. Kong API Gateway (DB-less mode)
  kong-gateway:
    image: kong:3.4-ubuntu
    container_name: kong_gateway
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001, 0.0.0.0:8444 ssl
    volumes:
      - ./kong_config/kong.yml:/kong/declarative/kong.yml
    ports:
      - "8000:8000"
      - "8001:8001"
    depends_on:
      - order-api
      - report-api
    networks:
      - noah_network

networks:
  noah_network:
    driver: bridge

volumes:
  mysql_data:
  postgres_data:
  rabbitmq_data:
