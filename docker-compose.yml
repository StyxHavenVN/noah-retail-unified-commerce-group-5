version: "3.8"

# Định nghĩa mạng nội bộ để các container giao tiếp bằng tên (DNS)
networks:
  noah_network:
    driver: bridge

# Khai báo Volumes để dữ liệu không bị mất khi tắt Docker
volumes:
  mysql_data:
  postgres_data:
  # mongo_data: # Bỏ comment nếu làm Bonus Audit Log

services:
  # 1. DATABASE HỆ THỐNG BÁN HÀNG
  mysql_db:
    image: mysql:8
    container_name: noah_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: noah_web_store
    volumes:
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3307:3306"
    networks:
      - noah_network

  # 2. DATABASE HỆ THỐNG TÀI CHÍNH
  postgres_db:
    image: postgres:15
    container_name: noah_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: noah_finance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - noah_network

  # 3. MESSAGE BROKER
  rabbitmq:
    image: rabbitmq:3-management
    container_name: noah_rabbitmq
    ports:
      - "5672:5672" # Cổng giao tiếp Message
      - "15672:15672" # Cổng giao diện UI quản lý (truy cập trình duyệt)
    networks:
      - noah_network

  # 4. Backend Service (Mục tiêu cần bảo vệ)
  backend_container:
    build: ./backend
    # Lưu ý: KHÔNG expose cổng 5000 ra máy thật (ports).
    # Chỉ Kong mới nhìn thấy Backend này. (Isolation)
    networks:
      - noah_network

  # 5. Kong Gateway (Người bảo vệ)
  kong:
    image: kong:2.8
    container_name: noah_kong
    volumes:
      - ./kong_config:/kong/declarative # Nạp file cấu hình vào
    environment:
      - KONG_DATABASE=off # Chế độ không DB
      - KONG_DECLARATIVE_CONFIG=/kong/declarative/kong.yml
      - KONG_PROXY_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_ACCESS_LOG=/dev/stdout
      - KONG_PROXY_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_LISTEN=0.0.0.0:8001, 0.0.0.0:8444 ssl
    ports:
      - "8000:8000" # Cổng chính để Client gọi vào (Proxy)
      - "8001:8001" # Cổng Admin (Quản trị)
    networks:
      - noah_network

  order_api:
    build:
      context: ./order_service # Thư mục chứa Dockerfile và app.py
    container_name: noah_order_api
    ports:
      - "5000:5000"
    networks:
      - noah_network
    depends_on:
      - mysql_db
      - rabbitmq

  legacy_adapter:
    build: ./legacy_adapter
    container_name: legacy_adapter
    depends_on:
      - mysql_db
    volumes:
      - ./legacy_adapter/input:/app/input
      - ./legacy_adapter/processed:/app/processed
    networks:
      - noah_network
  # 6. REPORTING API (Module 4 - Võ Ngọc Phú)
  report_api:
    build: ./report_api
    container_name: noah_report_api
    ports:
      - "5001:5000" # Map cổng 5000 trong container ra 5001 ở máy thật (tránh trùng với Hào)
    depends_on:
      - mysql_db
      - postgres_db
    networks:
      - noah_network # Phải cùng mạng để Service Discovery hoạt động [cite: 43, 105]